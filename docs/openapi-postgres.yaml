openapi: 3.0.3
info:
  title: 班客邦 PostgreSQL Command API
  version: 2026-07-18.2
  description: Implemented Staging transition API. Auth0 OIDC validation and local session boundaries exist, but external Auth0 PKCE/refresh integration and Production cutover are not approved.
servers:
  - url: http://127.0.0.1:8080/v1
    description: Local development only
security:
  - BearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        '200': { description: Process is running }
  /readiness:
    get:
      security: []
      responses:
        '200': { description: Database is reachable }
        '500': { $ref: '#/components/responses/Error' }
  /auth/session:
    post:
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '201': { description: Local revocable session established after live membership authorization }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /auth/logout:
    post:
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200': { description: Local session revoked }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /employees:
    get:
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200': { description: Active employees visible to boss or manager }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /commands/{commandName}:
    post:
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - in: path
          name: commandName
          required: true
          schema:
            type: string
            enum: [employees.create, shifts.create, leaves.replace-month, attendance.clock-in, attendance.clock-out, attendance.approve-hours]
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, minLength: 8, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '200': { description: Idempotent replay }
        '201': { description: Command committed }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
        '413': { $ref: '#/components/responses/Error' }
components:
  parameters:
    WorkspaceId:
      in: header
      name: X-Workspace-Id
      required: true
      description: Untrusted requested workspace; authorization is resolved server-side from live membership.
      schema: { type: string, pattern: '^ws_[a-f0-9]{32}$' }
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Auth0 OIDC access token (RS256)
  responses:
    Error:
      description: Structured API error
      content:
        application/json:
          schema:
            type: object
            required: [ok, error, code, requestId]
            properties:
              ok: { type: boolean, enum: [false] }
              error: { type: string }
              code: { type: string }
              requestId: { type: string }
